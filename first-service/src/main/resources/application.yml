spring:
  application:
    name: first-service
  datasource:
    url: jdbc:mysql://localhost:3306/first_service?useTimezone=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${ENV_ROOT_USER:root} # Procura por ENV_ROOT_USER e usa, se não achar usa 'root'
    password: ${ENV_ROOT_PASSWORD:devdojo} # Mesma coisa
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  threads:
    virtual:
      enabled: true
logging:
  level:
    academy.devdojo: debug

server:
  servlet:
    context-path: /
  error:
    include-stacktrace: ON_PARAM
  tomcat:
    threads:
      max: 20