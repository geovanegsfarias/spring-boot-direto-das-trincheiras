spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=true
    username: sa

  jpa:
    show-sql: true
    properties:
      hibernate:
        globally_quoted_identifiers: true # coloca o nome das tabelas em aspas duplas (h2 usa a palavra user, portanto dá erro ao tentar criar uma tabela user usando ele, essa é uma medida alternativa a mudar o nome da sua tabela só pro teste funcionar.)

# Os testes podem apagar os dados do bd,
# por isso é recomendado utilizar outro banco de dados para eles.

# Usamos o MYSQL para a aplicação
# E o banco de dados em memória H2 para os testes